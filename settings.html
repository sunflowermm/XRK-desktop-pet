<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 向日葵桌面宠物</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      color: #222;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 12px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 6px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background: white;
      color: #333;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-label {
      margin: 0;
      cursor: pointer;
      user-select: none;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
    }

    button {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.primary {
      background: #4a90e2;
      color: white;
    }

    button.primary:hover {
      background: #357abd;
    }

    button.secondary {
      background: #f0f0f0;
      color: #666;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>设置</h1>

    <div class="section">
      <div class="section-title">启动设置</div>
      
      <div class="form-group">
        <label for="defaultModel">默认模型</label>
        <select id="defaultModel">
          <option value="kuromi">Kuromi</option>
          <option value="mark">Mark</option>
          <option value="kaguya">Kaguya</option>
          <option value="cinamoroll">Cinnamoroll</option>
          <option value="robot">Robot</option>
        </select>
        <div class="help-text">应用启动时默认加载的模型</div>
      </div>

      <div class="form-group">
        <label for="defaultStageSize">默认窗口大小</label>
        <select id="defaultStageSize">
          <option value="small">小</option>
          <option value="medium">中</option>
          <option value="large">大</option>
        </select>
        <div class="help-text">应用启动时默认的窗口大小</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">窗口行为</div>
      
      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="isAlwaysOnTop">
          <label for="isAlwaysOnTop" class="checkbox-label">窗口置顶</label>
        </div>
        <div class="help-text">窗口始终显示在其他窗口之上</div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="skipTaskbar">
          <label for="skipTaskbar" class="checkbox-label">不在任务栏显示</label>
        </div>
        <div class="help-text">窗口不在任务栏中显示图标</div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="isLocked">
          <label for="isLocked" class="checkbox-label">锁定窗口</label>
        </div>
        <div class="help-text">锁定后窗口完全穿透，无法拖动和交互</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">开发调试</div>
      
      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="debugMode">
          <label for="debugMode" class="checkbox-label">启用调试模式</label>
        </div>
        <div class="help-text">启用后会在控制台输出详细的调试日志</div>
      </div>

    </div>

    <div class="button-group">
      <button class="secondary" id="cancelBtn">取消</button>
      <button class="primary" id="saveBtn">保存</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
