<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>向日葵桌面宠物</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      /* 注意：如果设置成 drag，会吞掉右键菜单等事件
         这里改为 no-drag，拖拽由渲染层 IPC 逻辑（renderer/index.js + overlay.js）处理 */
      -webkit-app-region: no-drag;
      cursor: default;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* 优化渲染性能 */
      will-change: transform;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    #live2d-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #canvas {
      display: block;
      -webkit-app-region: no-drag;
      /* 优化Canvas渲染性能 */
      will-change: transform;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* 加载提示 */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      z-index: 100;
    }

    /* 右键菜单使用原生 Menu.popup（Electron 主进程） */
  </style>
</head>
<body>
  <div id="live2d-container">
    <div id="loading">加载中...</div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- 使用本地库文件（参考 chatgpt-desktopPet） -->
  <script src="libs/live2dcubismcore.min.js"></script>
  <script src="libs/live2d.min.js"></script>
  <script src="libs/pixi.min.js"></script>
  <script src="libs/index.min.js"></script>
  <script src="libs/live2d.js"></script>
  <script src="renderer/index.js"></script>
</body>
</html>
