<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新 - 向日葵桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #f8fafc;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }
    .update-banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .update-banner__icon { font-size: 28px; }
    .update-banner__text { font-size: 15px; }
    .update-banner__version { font-weight: 700; }
    .update-banner--success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    .update-notes-wrap {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      background: white;
    }
    .update-notes { font-size: 13px; line-height: 1.6; }
    .update-notes h3 { font-size: 14px; margin: 12px 0 6px; }
    .update-notes h4 { font-size: 13px; margin: 10px 0 4px; }
    .update-notes ul { margin: 8px 0; padding-left: 20px; }
    .update-notes li { margin: 4px 0; }
    .update-notes p { margin: 6px 0; }
    .update-dialog-desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .update-progress-track {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0;
    }
    .update-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
    }
    .update-progress-text { font-size: 12px; color: #64748b; }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    button.primary:hover { opacity: 0.9; }
    button.secondary {
      background: #e2e8f0;
      color: #475569;
    }
    button.secondary:hover { background: #cbd5e1; }
    #update-content { min-height: 120px; }
  </style>
</head>
<body>
  <div id="update-content"></div>
  <div class="btn-group" id="btn-group"></div>
  <script src="update-dialog.js"></script>
</body>
</html>
